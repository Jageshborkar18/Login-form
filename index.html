<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Form (React)</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #555; --accent: #a8ff78; --error: #ff6b6b; --success: #78ffd6; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 50%, rgba(168,255,120,0.04) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(120,255,214,0.03) 0%, transparent 60%); pointer-events: none; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const DEMO_USER = { email: 'demo@jagesh.dev', password: 'React@123' };

function LoginApp() {
  const [screen, setScreen] = useState('login'); 
  const [form, setForm] = useState({ email: '', password: '' });
  const [errors, setErrors] = useState({});
  const [showPass, setShowPass] = useState(false);
  const [loading, setLoading] = useState(false);
  const [shake, setShake] = useState(false);
  const emailRef = useRef(null);

  useEffect(() => { emailRef.current?.focus(); }, []);

  const validate = () => {
    const e = {};
    if (!form.email) e.email = 'Email is required';
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = 'Invalid email format';
    if (!form.password) e.password = 'Password is required';
    else if (form.password.length < 6) e.password = 'At least 6 characters';
    return e;
  };

  const handleChange = (field, val) => {
    setForm(f => ({ ...f, [field]: val }));
    if (errors[field]) setErrors(e => ({ ...e, [field]: '' }));
  };

  const handleSubmit = async () => {
    const e = validate();
    if (Object.keys(e).length) {
      setErrors(e);
      setShake(true);
      setTimeout(() => setShake(false), 500);
      return;
    }
    setLoading(true);
    await new Promise(r => setTimeout(r, 1200));
    setLoading(false);
    if (form.email === DEMO_USER.email && form.password === DEMO_USER.password) {
      setScreen('success');
    } else {
      setErrors({ general: 'Invalid credentials. Try demo@jagesh.dev / React@123' });
      setShake(true);
      setTimeout(() => setShake(false), 500);
    }
  };

  const handleKey = (e) => { if (e.key === 'Enter') handleSubmit(); };
  const fillDemo = () => setForm({ email: DEMO_USER.email, password: DEMO_USER.password });

  const inputStyle = (field) => ({
    width: '100%', background: '#0d0d0d',
    border: `1px solid ${errors[field] ? '#ff6b6b' : form[field] ? 'rgba(168,255,120,0.35)' : '#1e1e1e'}`,
    color: '#e8e8e8', fontFamily: "'DM Sans', sans-serif", fontSize: '0.95rem',
    padding: '13px 44px 13px 16px', borderRadius: '10px', outline: 'none', transition: 'border-color 0.2s',
  });

  if (screen === 'success') return (
    <div style={{ textAlign: 'center', animation: 'fadeUp 0.5s ease' }}>
      <style>{`@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }`}</style>
      <div style={{ fontSize: '4rem', marginBottom: '20px' }}>✅</div>
      <div style={{ fontFamily: "'Syne',sans-serif", fontSize: '2rem', fontWeight: 800, marginBottom: '12px' }}>Welcome Back!</div>
      <div style={{ color: '#555', marginBottom: '8px' }}>Logged in as</div>
      <div style={{ fontFamily: "'JetBrains Mono',monospace", color: '#a8ff78', marginBottom: '32px' }}>{form.email}</div>
      <button onClick={() => { setScreen('login'); setForm({ email: '', password: '' }); setErrors({}); }}
        style={{ background: '#a8ff78', border: 'none', borderRadius: '10px', padding: '12px 28px', fontFamily: "'Syne',sans-serif", fontWeight: 700, fontSize: '0.9rem', cursor: 'pointer' }}>
        Sign Out
      </button>
    </div>
  );

  return (
    <div style={{ background: '#111', border: '1px solid #1e1e1e', borderRadius: '20px', padding: '40px 36px', width: '100%', maxWidth: '420px', boxShadow: '0 24px 80px rgba(0,0,0,0.6)', animation: shake ? 'shakeX 0.4s ease' : 'fadeUp 0.4s ease', }}>
      <style>{`
        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @keyframes shakeX { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
        input:focus { border-color: rgba(168,255,120,0.6) !important; }
        .inp-wrap { position:relative; }
        .inp-icon { position:absolute; right:14px; top:50%; transform:translateY(-50%); color:#555; font-size:1rem; cursor:pointer; user-select:none; }
        .inp-icon:hover { color:#a8ff78; }
      `}</style>

      {/* Logo */}
      <div style={{ display:'flex', alignItems:'center', gap:'10px', marginBottom:'32px' }}>
        <div style={{ width:38, height:38, borderRadius:'10px', background:'linear-gradient(135deg,#a8ff78,#78ffd6)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'1.1rem' }}>⚛️</div>
        <div>
          <div style={{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:'1rem', letterSpacing:'-0.3px' }}>ReactAuth</div>
        </div>
      </div>

      <h2 style={{ fontFamily:"'Syne',sans-serif", fontSize:'1.9rem', fontWeight:800, letterSpacing:'-0.5px', marginBottom:'6px' }}>Sign In</h2>
      <p style={{ color:'#555', fontSize:'0.9rem', marginBottom:'28px' }}>Welcome back! Enter your credentials.</p>

      {errors.general && (
        <div style={{ background:'rgba(255,107,107,0.08)', border:'1px solid rgba(255,107,107,0.25)', borderRadius:'8px', padding:'10px 14px', marginBottom:'20px', color:'#ff8080', fontSize:'0.83rem', fontFamily:"'JetBrains Mono',monospace" }}>⚠️ {errors.general}</div>
      )}

      <div style={{ marginBottom:'18px' }}>
        <label style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'0.72rem', color:'#a8ff78', letterSpacing:'0.1em', marginBottom:'8px', display:'block' }}>EMAIL</label>
        <div className="inp-wrap">
          <input ref={emailRef} type="email" value={form.email} placeholder="you@example.com" onChange={e => handleChange('email', e.target.value)} onKeyDown={handleKey} style={inputStyle('email')} />
          <span className="inp-icon">✉️</span>
        </div>
        {errors.email && <div style={{ color:'#ff6b6b', fontSize:'0.78rem', marginTop:'6px', fontFamily:"'JetBrains Mono',monospace" }}>↑ {errors.email}</div>}
      </div>

      <div style={{ marginBottom:'24px' }}>
        <label style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'0.72rem', color:'#a8ff78', letterSpacing:'0.1em', marginBottom:'8px', display:'block' }}>PASSWORD</label>
        <div className="inp-wrap">
          <input type={showPass ? 'text' : 'password'} value={form.password} placeholder="••••••••" onChange={e => handleChange('password', e.target.value)} onKeyDown={handleKey} style={inputStyle('password')} />
          <span className="inp-icon" onClick={() => setShowPass(s => !s)}>{showPass ? '🙈' : '👁️'}</span>
        </div>
        {errors.password && <div style={{ color:'#ff6b6b', fontSize:'0.78rem', marginTop:'6px', fontFamily:"'JetBrains Mono',monospace" }}>↑ {errors.password}</div>}
      </div>

      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'28px' }}>
        <label style={{ display:'flex', alignItems:'center', gap:'8px', cursor:'pointer', fontSize:'0.88rem', color:'#555' }}>
          <input type="checkbox" style={{ accentColor:'#a8ff78', width:15, height:15 }} /> Remember me
        </label>
        <span style={{ color:'#a8ff78', fontSize:'0.85rem', cursor:'pointer' }}>Forgot password?</span>
      </div>

      <button onClick={handleSubmit} disabled={loading} style={{ width:'100%', background: loading ? '#3a5c2a' : '#a8ff78', border:'none', borderRadius:'10px', padding:'14px', fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:'1rem', cursor: loading ? 'not-allowed' : 'pointer', color:'#000', transition:'transform 0.2s, box-shadow 0.2s', display:'flex', alignItems:'center', justifyContent:'center', gap:'8px' }}>
        {loading ? (
          <>
            <span style={{ display:'inline-block', width:16, height:16, border:'2px solid #000', borderTopColor:'transparent', borderRadius:'50%', animation:'spin 0.6s linear infinite' }}/>
            Authenticating...
          </>
        ) : 'Sign In →'}
      </button>
      <style>{`@keyframes spin { to{transform:rotate(360deg)} }`}</style>

      <div style={{ marginTop:'20px', textAlign:'center' }}>
        <span onClick={fillDemo} style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'0.7rem', color:'#555', cursor:'pointer', borderBottom:'1px dashed #333', paddingBottom:'1px' }}>use demo credentials</span>
      </div>

      <p style={{ textAlign:'center', marginTop:'24px', color:'#555', fontSize:'0.88rem' }}>No account?{' '} <span style={{ color:'#a8ff78', cursor:'pointer' }}>Create one →</span></p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<LoginApp/>);
</script>
</body>
</html>
